# Render Blueprint — deploys the Django backend.
# In Render: New → Blueprint → pick this repo. It reads everything below.
# (The React frontend deploys separately on Vercel — see README.)
services:
  - type: web
    name: rag-chatbot-backend
    runtime: python
    plan: free
    rootDir: backend            # Django lives in backend/, not the repo root
    healthCheckPath: /api/health/
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    # Bind to Render's $PORT. 1 worker + long timeout keeps memory low and gives
    # the first request time to load the embedding model.
    startCommand: "gunicorn config.wsgi:application --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECRET_KEY
        generateValue: true     # Render generates a strong secret for you
      - key: MONGODB_DB
        value: "ragchatbot"
      # --- Secrets: set these in the Render dashboard (sync:false = not in repo) ---
      - key: MONGODB_HOST        # MongoDB Atlas SRV string: mongodb+srv://user:pass@cluster/...
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS  # your Vercel URL, e.g. https://your-app.vercel.app
        sync: false
      - key: CSRF_TRUSTED_ORIGINS  # e.g. https://your-app.vercel.app,https://*.onrender.com
        sync: false
